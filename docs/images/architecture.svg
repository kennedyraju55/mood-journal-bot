<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e0a2e"/>
      <stop offset="100%" style="stop-color:#3e1545"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f72585"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#f72585" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="bold">System Architecture</text>

  <!-- User -->
  <rect x="30" y="55" width="150" height="80" rx="10" fill="#1e293b" stroke="#f72585" stroke-width="2"/>
  <text x="105" y="78" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🧠 Journal User</text>
  <text x="105" y="95" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">10 Mood Types</text>
  <text x="105" y="110" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Energy Level (1-10)</text>
  <text x="105" y="125" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Gratitude • Free Text</text>

  <line x1="180" y1="95" x2="220" y2="95" stroke="#f72585" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Journal Engine -->
  <rect x="225" y="40" width="180" height="110" rx="10" fill="#1e293b" stroke="#f72585" stroke-width="2"/>
  <text x="315" y="65" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📝 Journal Engine</text>
  <text x="315" y="83" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">add_entry()</text>
  <text x="315" y="98" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">analyze_entries()</text>
  <text x="315" y="113" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">generate_weekly_report()</text>
  <text x="315" y="128" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">generate_monthly_report()</text>
  <text x="315" y="143" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">get_gratitude_prompt()</text>

  <line x1="405" y1="95" x2="445" y2="95" stroke="#f72585" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="450" y="60" width="155" height="70" rx="10" fill="#b5179e" stroke="#f72585" stroke-width="2"/>
  <text x="527" y="87" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">🤖 Gemma 4</text>
  <text x="527" y="107" text-anchor="middle" fill="#fce7f3" font-family="Segoe UI,Arial,sans-serif" font-size="11">Ollama Local LLM</text>

  <!-- Stats -->
  <rect x="30" y="180" width="150" height="60" rx="10" fill="#1e293b" stroke="#b5179e" stroke-width="2"/>
  <text x="105" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📊 Mood Stats</text>
  <text x="105" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">get_mood_stats() • Charts</text>

  <!-- Export -->
  <rect x="225" y="180" width="180" height="60" rx="10" fill="#1e293b" stroke="#b5179e" stroke-width="2"/>
  <text x="315" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📤 Export System</text>
  <text x="315" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">export_entries() • CSV + JSON</text>

  <!-- Emoji Mapping -->
  <rect x="450" y="180" width="155" height="60" rx="10" fill="#1e293b" stroke="#b5179e" stroke-width="2"/>
  <text x="527" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">😊 Mood Mapping</text>
  <text x="527" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">10 moods + emoji + score</text>

  <!-- Storage -->
  <rect x="645" y="140" width="130" height="100" rx="10" fill="#1e293b" stroke="#f72585" stroke-width="2"/>
  <text x="710" y="165" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💾 Storage</text>
  <text x="710" y="185" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">journal_entries.json</text>
  <text x="710" y="201" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Timestamped entries</text>
  <text x="710" y="217" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">CSV export support</text>

  <!-- Interfaces -->
  <rect x="30" y="285" width="230" height="70" rx="10" fill="#1e293b" stroke="#f72585" stroke-width="2"/>
  <text x="145" y="310" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🖥️ CLI (8 Commands)</text>
  <text x="145" y="327" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">journal | analyze | history | stats</text>
  <text x="145" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">weekly/monthly-report | gratitude | export</text>

  <rect x="300" y="285" width="230" height="70" rx="10" fill="#1e293b" stroke="#f72585" stroke-width="2"/>
  <text x="415" y="310" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🌐 Web UI (4 Tabs)</text>
  <text x="415" y="327" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Journal | Mood Chart | Insights | Export</text>
  <text x="415" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Line Charts • AI Analysis • Reports</text>

  <text x="400" y="385" text-anchor="middle" fill="#4a5568" font-family="Segoe UI,Arial,sans-serif" font-size="11">Mood Journal Bot — 10 Moods • Energy Tracking • AI Insights • Weekly/Monthly Reports</text>
</svg>
